<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./css/main.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="container">
      <main>
        <header>
          <h1>SF Airbnb Listings</h1>
          <nav>
            <ul>
              <li>Home</li>
              <li>About</li>
            </ul>
          </nav>
        </header>
        <div class="row">
          <div class="col-8">
            <section class="listings">
              <div
                class="d-flex justify-content-between align-items-center mb-3"
              >
                <h2>Listings</h2>
                <div class="btn-group" role="group" aria-label="View toggle">
                  <button
                    type="button"
                    class="btn btn-outline-primary view-toggle-btn active"
                    data-view="normal"
                  >
                    Normal
                  </button>
                  <button
                    type="button"
                    class="btn btn-outline-primary view-toggle-btn"
                    data-view="compact"
                  >
                    Compact
                  </button>
                </div>
              </div>

              <div id="listings" class="row"></div>
            </section>
          </div>
          <div class="col-4">
            <h2>Create Listing</h2>
            <form id="form-create-listing"></form>
            <div class="mb-3">
              <label class="form-label">
                <div>Title</div>
                <input type="text" id="input-title" class="form-control" />
              </label>
            </div>
            <div class="mb-3">
              <label class="form-label">
                <div>Price</div>
                <input type="number" id="input-price" class="form-control" />
              </label>
            </div>
            <div class="mb-3">
              <label class="form-label">
                <div>Description</div>
                <input
                  type="text"
                  id="input-description"
                  class="form-control"
                />
              </label>
            </div>
            <div class="mb-3">
              <button class="btn btn-primary" type="submit">Create</button>
              <button id="btn-cancel" class="btn btn-secondary">Cancel</button>
            </div>
          </div>
        </div>
      </main>
      <footer>
        <div>Made by Julia</div>
      </footer>
      <script src="./js/main.js"></script>
      <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"
      ></script>
    </div>
  </body>
</html>
